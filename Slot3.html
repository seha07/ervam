<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Diamonds - Slot 3</title>
    <style>
        body {
            background-color: #1a1005;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .machine {
            max-width: 600px;
            margin: 40px auto;
            background: #2b1d0c;
            border: 5px solid #ffff00;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 25px #ffff00;
        }
        .title { color: #ffff00; text-shadow: 0 0 10px #ffff00; }
        .back-btn { background: #444; color: #fff; border: none; padding: 5px 15px; cursor: pointer; margin-bottom: 20px;}
        .reels {
            display: flex;
            justify-content: space-around;
            background: #000;
            padding: 20px;
            border: 3px solid #00ff66;
            border-radius: 10px;
            margin: 20px 0;
        }
        .reel {
            font-size: 4rem;
            width: 100px;
            height: 100px;
            line-height: 100px;
            background: #111;
            border: 2px solid #ffff00;
            border-radius: 5px;
        }
        .controls { margin: 20px 0; }
        input[type="number"] {
            background: #000;
            color: #ffff00;
            border: 2px solid #00ff66;
            padding: 8px;
            font-size: 1.2rem;
            width: 100px;
            text-align: center;
            font-family: monospace;
        }
        .spin-btn {
            background: #ff007f;
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            padding: 10px 30px;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 0 #800040;
            border-radius: 5px;
        }
        .spin-btn:active { transform: translateY(4px); box-shadow: none; }
        .status { font-size: 1.2rem; color: #ffff00; min-height: 30px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="machine">
    <button class="back-btn" onclick="window.location.href='index.html'"><- Geri Dön</button>
    <h1 class="title">💎 PIXEL DIAMONDS 💎</h1>
    <div>Bakiye: <span id="balance" style="color:#ffff00; font-weight:bold;">0</span> Coin</div>
    
    <div class="reels">
        <div class="reel" id="r1">💎</div>
        <div class="reel" id="r2">👑</div>
        <div class="reel" id="r3">💰</div>
    </div>

    <div class="controls">
        <label>BAHİS (10-100): </label>
        <input type="number" id="bet" value="10" min="10" max="100">
        <button class="spin-btn" onclick="spin()">KAZ</button>
    </div>

    <div class="status" id="status">Piksel madenlerini çıkarın!</div>
</div>

<script>
    const symbols = ['💎', '👑', '💰', '💵', '🪙', '🏆'];
    
    function updateBalance() {
        document.getElementById('balance').innerText = localStorage.getItem('arcade_coins');
    }
    updateBalance();

    function spin() {
        let coins = parseInt(localStorage.getItem('arcade_coins'));
        let bet = parseInt(document.getElementById('bet').value);

        if (isNaN(bet) || bet < 10 || bet > 100) {
            alert("Lütfen 10 ile 100 arasında geçerli bir bahis giriniz!");
            return;
        }
        if (coins < bet) {
            alert("Yetersiz bakiye!");
            return;
        }

        coins -= bet;
        localStorage.setItem('arcade_coins', coins.toString());
        updateBalance();

        // Tam %35.5 RTP Oranı
        let isWin = Math.random() < 0.355; 
        let res1, res2, res3;

        if (isWin) {
            let winSymbol = symbols[Math.floor(Math.random() * symbols.length)];
            res1 = winSymbol; res2 = winSymbol; res3 = winSymbol;
            let prize = bet * 3;
            coins += prize;
            localStorage.setItem('arcade_coins', coins.toString());
            
            setTimeout(() => {
                document.getElementById('status').innerText = `BÜYÜK MADEN BULUNDU: +${prize} Coin!`;
                document.getElementById('status').style.color = "#ffff00";
                updateBalance();
            }, 300);
        } else {
            res1 = symbols[Math.floor(Math.random() * symbols.length)];
            res2 = symbols[Math.floor(Math.random() * symbols.length)];
            res3 = symbols[Math.floor(Math.random() * symbols.length)];
            
            if(res1 === res2 && res2 === res3) {
                res3 = symbols[(symbols.indexOf(res3) + 1) % symbols.length];
            }

            setTimeout(() => {
                document.getElementById('status').innerText = "Boş kaya denk geldi! Tekrar Dene.";
                document.getElementById('status').style.color = "#ff007f";
            }, 300);
        }

        document.getElementById('r1').innerText = res1;
        document.getElementById('r2').innerText = res2;
        document.getElementById('r3').innerText = res3;
    }
</script>
