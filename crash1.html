<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Aviator - Crash Oyunu</title>
    <style>
        body {
            background-color: #0d021a;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .machine {
            max-width: 700px;
            margin: 30px auto;
            background: #15062b;
            border: 5px solid #ff007f;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 0 25px #ff007f;
        }
        .title { color: #ff007f; text-shadow: 0 0 10px #ff007f; margin-top: 5px;}
        .back-btn { background: #333; color: #fff; border: none; padding: 5px 15px; cursor: pointer; margin-bottom: 15px; font-family: monospace;}
        
        .game-screen {
            background: #000;
            border: 3px solid #33ffff;
            border-radius: 10px;
            height: 300px;
            position: relative;
            overflow: hidden;
            margin: 20px 0;
            box-shadow: inset 0 0 15px rgba(51, 255, 255, 0.3);
        }
        #multiplier-display {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5rem;
            color: #ffff00;
            font-weight: bold;
            text-shadow: 0 0 10px #ffff00;
            z-index: 10;
        }
        #plane {
            position: absolute;
            font-size: 2.5rem;
            bottom: 20px;
            left: 20px;
            transition: bottom 0.1s linear, left 0.1s linear;
        }
        .controls {
            background: #221133;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #ff007f;
        }
        input[type="number"] {
            background: #000;
            color: #00ff66;
            border: 2px solid #33ffff;
            padding: 8px;
            font-size: 1.2rem;
            width: 100px;
            text-align: center;
            font-family: monospace;
        }
        .btn-action {
            font-size: 1.3rem;
            font-weight: bold;
            padding: 10px 25px;
            border: none;
            cursor: pointer;
            border-radius: 5px;
            margin-left: 10px;
            font-family: 'Courier New', monospace;
        }
        .bet-btn { background: #00ff66; color: #000; box-shadow: 0 4px 0 #009933; }
        .cashout-btn { background: #ffff00; color: #000; box-shadow: 0 4px 0 #999900; display: none; }
        .btn-action:active { transform: translateY(2px); box-shadow: none; }
        
        .status-box { font-size: 1.1rem; color: #00ff66; min-height: 25px; margin-top: 10px; }
        
        .star {
            position: absolute;
            background: #fff;
            width: 2px;
            height: 2px;
            opacity: 0.5;
        }
    </style>
</head>
<body>

<div class="machine">
    <button class="back-btn" onclick="window.location.href='index.html'"><- Salon Menüsüne Dön</button>
    <h1 class="title">✈️ RETRO AVIATOR ✈️</h1>
    <div style="font-size: 1.2rem;">Bakiye: <span id="balance" style="color:#00ff66; font-weight:bold;">0</span> Coin</div>
    
    <div class="game-screen" id="screen">
        <div id="multiplier-display">1.00x</div>
        <div id="plane">✈️</div>
    </div>

    <div class="controls">
        <label>BAHİS (1-100 Coin): </label>
        <input type="number" id="bet-input" value="10" min="1" max="100">
        
        <button id="bet-btn" class="btn-action bet-btn" onclick="startRound()">BAHİS YAP VE UÇUR</button>
        <button id="cashout-btn" class="btn-action cashout-btn" onclick="cashout()">NAKİT ÇEK</button>
    </div>

    <div class="status-box" id="status-log">Bahis miktarınızı ayarlayın ve uçuşu başlatın!</div>
</div>

<script>
    let currentMultiplier = 1.00;
    let crashMultiplier = 1.00;
    let gameInterval = null;
    let isPlaying = false;
    let hasCashout = false;
    let currentBet = 0;

    // KÖPRÜ: Giriş yapmış kullanıcının güncel bakiyesini çekme
    function syncBalanceFromUser() {
        let activeUser = localStorage.getItem('active_arcade_session');
        if (activeUser) {
            let userDb = JSON.parse(localStorage.getItem('arcade_users')) || {};
            if (userDb[activeUser]) {
                localStorage.setItem('arcade_coins', userDb[activeUser].coins.toString());
            }
        } else if (localStorage.getItem('arcade_coins') === null) {
            localStorage.setItem('arcade_coins', '1000');
        }
    }

    function updateBalanceDisplay() {
        syncBalanceFromUser();
        document.getElementById('balance').innerText = localStorage.getItem('arcade_coins');
    }
    updateBalanceDisplay();

    // KÖPRÜ: Oyun içi bakiye değişimini kullanıcı veri tabanına yazma fonksiyonu
    function saveBalanceToUser(newCoins) {
        localStorage.setItem('arcade_coins', newCoins.toString());
        let activeUser = localStorage.getItem('active_arcade_session');
        if (activeUser) {
            let userDb = JSON.parse(localStorage.getItem('arcade_users')) || {};
            if (userDb[activeUser]) {
                userDb[activeUser].coins = newCoins;
                localStorage.setItem('arcade_users', JSON.stringify(userDb));
            }
        }
    }

    const screen = document.getElementById('screen');
    for (let i = 0; i < 20; i++) {
        let star = document.createElement('div');
        star.className = 'star';
        star.style.top = Math.random() * 100 + '%';
        star.style.left = Math.random() * 100 + '%';
        screen.appendChild(star);
    }

    function startRound() {
        if (isPlaying) return;

        syncBalanceFromUser();
        let coins = parseInt(localStorage.getItem('arcade_coins')) || 0;
        let bet = parseInt(document.getElementById('bet-input').value);

        if (isNaN(bet) || bet < 1 || bet > 100) {
            alert("Lütfen 1 ile 100 arasında bir bahis giriniz!");
            return;
        }
        if (coins < bet) {
            alert("Yetersiz bakiye!");
            return;
        }

        coins -= bet;
        currentBet = bet;
        
        // Cüzdanı kaydet ve güncelle
        saveBalanceToUser(coins);
        updateBalanceDisplay();

        isPlaying = true;
        hasCashout = false;
        currentMultiplier = 1.00;
        
        document.getElementById('bet-input').disabled = true;
        document.getElementById('bet-btn').style.display = 'none';
        document.getElementById('cashout-btn').style.display = 'inline-block';
        document.getElementById('status-log').innerText = "Uçak havalandı... Dikkatli olun!";
        document.getElementById('status-log').style.color = "#ffff00";

        let rtpCheck = Math.random();
        if (rtpCheck < 0.425) {
            crashMultiplier = 1.20 + (Math.random() * 4.5); 
        } else {
            crashMultiplier = 1.00 + (Math.random() * 0.18); 
        }

        const plane = document.getElementById('plane');
        plane.style.bottom = '20px';
        plane.style.left = '20px';
        plane.innerText = "✈️";

        gameInterval = setInterval(() => {
            currentMultiplier += 0.03 + (currentMultiplier * 0.015);
            
            if (currentMultiplier >= crashMultiplier) {
                clearInterval(gameInterval);
                document.getElementById('multiplier-display').innerText = "CRASH! @" + crashMultiplier.toFixed(2) + "x";
                document.getElementById('multiplier-display').style.color = "#ff007f";
                plane.innerText = "💥";
                endRound();
            } else {
                document.getElementById('multiplier-display').innerText = currentMultiplier.toFixed(2) + "x";
                document.getElementById('multiplier-display').style.color = "#ffff00";
                
                let progressRatio = (currentMultiplier - 1) / 5;
                if(progressRatio > 1) progressRatio = 1;
                plane.style.left = (20 + progressRatio * 70) + '%';
                plane.style.bottom = (20 + progressRatio * 60) + '%';
            }
        }, 100);
    }

    function cashout() {
        if (!isPlaying || hasCashout) return;
        
        hasCashout = true;
        clearInterval(gameInterval);
        
        let winMultiplier = currentMultiplier;
        let winAmount = Math.floor(currentBet * winMultiplier);
        
        let coins = parseInt(localStorage.getItem('arcade_coins')) || 0;
        coins += winAmount;
        
        // Cüzdanı kaydet ve güncelle
        saveBalanceToUser(coins);
        
        document.getElementById('status-log').innerText = `BAŞARILI NAKİT ÇEKİM! ${winMultiplier.toFixed(2)}x Oranından +${winAmount} Coin Kazandınız!`;
        document.getElementById('status-log').style.color = "#00ff66";
        
        updateBalanceDisplay();
        document.getElementById('cashout-btn').style.display = 'none';
        
        gameInterval = setInterval(() => {
            currentMultiplier += 0.04;
            if (currentMultiplier >= crashMultiplier) {
                clearInterval(gameInterval);
                document.getElementById('multiplier-display').innerText = "CRASH! @" + crashMultiplier.toFixed(2) + "x";
                document.getElementById('multiplier-display').style.color = "#ff007f";
                document.getElementById('plane').innerText = "💥";
                resetControlsAfterFlight();
            } else {
                document.getElementById('multiplier-display').innerText = currentMultiplier.toFixed(2) + "x";
            }
        }, 100);
    }

    function endRound() {
        if (!hasCashout) {
            document.getElementById('status-log').innerText = "Uçak düştü! Bahsi kaybettiniz.";
            document.getElementById('status-log').style.color = "#ff007f";
        }
        resetControlsAfterFlight();
    }

    function resetControlsAfterFlight() {
        isPlaying = false;
        document.getElementById('bet-input').disabled = false;
        document.getElementById('bet-btn').style.display = 'inline-block';
        document.getElementById('cashout-btn').style.display = 'none';
    }
</script>
