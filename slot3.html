<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Diamonds - Slot Oyunu 3</title>
    <style>
        body { background-color: #200510; color: #ff007f; font-family: monospace; text-align: center; margin:0; padding:0; }
        .machine { max-width: 500px; margin: 40px auto; background: #000; border: 4px solid #ff007f; border-radius: 15px; padding: 20px; box-shadow: 0 0 20px #ff007f; }
        .slots { display: flex; justify-content: space-around; background: #111; padding: 20px; border-radius: 10px; font-size: 3rem; margin: 20px 0; border: 2px dashed #33ffff; }
        .slot-box { width: 80px; height: 80px; line-height: 80px; background: #000; border: 2px solid #ff007f; border-radius: 5px; text-shadow: 0 0 10px #ff007f; }
        .btn { background: #ff007f; color: #fff; border: none; padding: 12px 30px; font-size: 1.2rem; cursor: pointer; font-family: monospace; font-weight: bold; border-radius: 5px; box-shadow: 0 4px 0 #99004c;}
        .btn:active { transform: translateY(4px); box-shadow: none; }
        .back-btn { background: #333; color: #fff; border: none; padding: 5px 15px; cursor: pointer; margin-bottom: 15px;}
    </style>
</head>
<body>

<div class="machine">
    <button class="back-btn" onclick="window.location.href='index.html'"><- Geri Dön</button>
    <h1 style="color: #33ffff; text-shadow: 0 0 10px #33ffff; margin: 5px 0;">💎 PIXEL DIAMONDS 💎</h1>
    <p>RTP: %35.5 | Giriş Bedeli: 50 Coin</p>
    
    <div style="font-size: 1.3rem;">Bakiye: <span id="balance" style="color:#00ff66; font-weight:bold;">0</span> Coin</div>

    <div class="slots">
        <div class="slot-box" id="s1">💎</div>
        <div class="slot-box" id="s2">🟥</div>
        <div class="slot-box" id="s3">🟩</div>
    </div>

    <button class="btn" onclick="spin()">PİKSELLERİ KIR</button>
    <div id="status" style="margin-top: 20px; font-size: 1.2rem; min-height: 25px; color: #33ffff;"></div>
</div>

<script>
    const items = ['💎', '🟥', '🟩', '🟨', '🔮', '💥'];

    function syncFromUser() {
        let activeUser = localStorage.getItem('active_arcade_session');
        if (activeUser) {
            let userDb = JSON.parse(localStorage.getItem('arcade_users')) || {};
            if (userDb[activeUser]) {
                localStorage.setItem('arcade_coins', userDb[activeUser].coins.toString());
            }
        }
    }
    syncFromUser();

    function updateDisplay() {
        syncFromUser();
        document.getElementById('balance').innerText = localStorage.getItem('arcade_coins');
    }
    updateDisplay();

    function saveToUser(newCoins) {
        localStorage.setItem('arcade_coins', newCoins.toString());
        let activeUser = localStorage.getItem('active_arcade_session');
        if (activeUser) {
            let userDb = JSON.parse(localStorage.getItem('arcade_users')) || {};
            if (userDb[activeUser]) {
                userDb[activeUser].coins = newCoins;
                localStorage.setItem('arcade_users', JSON.stringify(userDb));
            }
        }
    }

    function spin() {
        syncFromUser();
        let coins = parseInt(localStorage.getItem('arcade_coins')) || 0;
        if (coins < 50) { alert("Yetersiz bakiye! Vip Piksel Jetonu gerekli."); return; }

        coins -= 50;
        saveToUser(coins);
        updateDisplay();
        document.getElementById('status').innerText = "Matris taranıyor...";

        let rtp = Math.random();
        let res1, res2, res3;

        if (rtp < 0.355) {
            res1 = items[Math.floor(Math.random() * items.length)];
            res2 = res1; res3 = res1;
        } else {
            res1 = items[Math.floor(Math.random() * items.length)];
            res2 = items[Math.floor(Math.random() * items.length)];
            res3 = items[Math.floor(Math.random() * items.length)];
            if(res1 === res2 && res2 === res3) {
                res3 = items[(items.indexOf(res3) + 1) % items.length];
            }
        }

        setTimeout(() => {
            document.getElementById('s1').innerText = res1;
            document.getElementById('s2').innerText = res2;
            document.getElementById('s3').innerText = res3;

            if (res1 === res2 && res2 === res3) {
                let win = 500;
                if(res1 === '💎') win = 2000;
                else if(res1 === '🔮') win = 1000;
                
                coins += win;
                saveToUser(coins);
                document.getElementById('status').innerText = `💎 ULTRA ELMAS KOMBİNASYONU! +${win} COIN! 💎`;
                document.getElementById('status').style.color = "#00ff66";
            } else {
                document.getElementById('status').innerText = "Pikseller Uyuşmadı!";
                document.getElementById('status').style.color = "#ff007f";
            }
            updateDisplay();
        }, 800);
    }
</script>
